<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quantum Council</title>
  <link rel="stylesheet" href="styles.css?v=5" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QC" />
  <meta name="theme-color" content="#000000" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">
      <div class="app-icon">&#9670;</div>
      Quantum Council
    </div>
    <div class="top-bar-actions">
      <button class="pill-btn" id="council-mode-toggle" title="Toggle Clarify / Embody">&#10024; Embody</button>
      <button class="icon-btn" id="clear-chat-btn" title="Clear chat">&#10005;</button>
    </div>
  </div>

  <!-- INTENTION BAR -->
  <div class="intention-bar">
    <span class="intention-label">Intention</span>
    <div class="intention-text" id="intention-text">(tap Edit to set)</div>
    <button class="intention-action" id="intention-edit-btn">Edit</button>
  </div>

  <!-- PHASE INDICATOR -->
  <div class="phase-indicator" id="phase-indicator"></div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div id="chat-messages"></div>
    <div class="typing-indicator" id="typing-indicator" style="display:none;"></div>
  </div>

  <!-- COUNCIL STATUS -->
  <div class="council-status" id="council-status"></div>

  <!-- COMPOSER AREA -->
  <div class="composer-area">
    <div class="composer-row">
      <textarea id="user-input" placeholder="Speak to the council&#8230;" rows="1"></textarea>
      <button class="send-btn" id="send-btn" title="Send">&#10148;</button>
    </div>
    <div class="composer-actions">
      <button class="action-btn primary" id="council-btn">&#9889; Council</button>
      <button class="action-btn accent" id="start-session-btn" title="Architect opens a new session">&#129504; Start</button>
      <button class="action-btn" id="council-convo-btn" title="Let the council talk amongst themselves">&#9711; Talk</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-council" onclick="setNavTab('council')">
      <span class="nav-icon">&#9670;</span>
      <span class="nav-label">Council</span>
    </button>
    <button class="nav-btn" id="nav-solo" onclick="openSoloSheet()">
      <span class="nav-icon">&#9651;</span>
      <span class="nav-label">1-on-1</span>
    </button>
    <button class="nav-btn" id="nav-journal" onclick="openIntentionJournalNav()">
      <span class="nav-icon">&#9711;</span>
      <span class="nav-label">Journal</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="openSettingsNav()">
      <span class="nav-icon">&#9881;</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <!-- SHEET: 1-on-1 SOLO MODE -->
  <div class="sheet-overlay" id="solo-sheet" onclick="closeSheetOnBackdrop(event,'solo-sheet')">
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">1-on-1 Mode</div>
      <div class="sheet-subtitle">Choose a council member to speak with privately</div>
      <div class="solo-list" id="solo-persona-list"></div>
      <div class="sheet-actions">
        <button class="sheet-btn secondary" onclick="setNavTab('council')">Back to Full Council</button>
        <button class="sheet-btn ghost" onclick="closeSheet('solo-sheet')">Close</button>
      </div>
    </div>
  </div>

  <!-- SHEET: SETTINGS -->
  <div class="sheet-overlay" id="settings-sheet" onclick="closeSheetOnBackdrop(event,'settings-sheet')">
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Settings</div>
      <div class="sheet-subtitle">Worker connection and persona models</div>
      <div class="worker-block">
        <div class="worker-block-title">&#9654; Worker Connection</div>
        <button id="fill-all-btn" class="action-btn accent" style="width:100%;margin-top:8px;">&#9679; Test Connection</button>
      </div>
      <div id="persona-settings-list"></div>
      <div class="sheet-actions">
        <button class="sheet-btn primary" id="settings-save">Save Settings</button>
        <button class="sheet-btn ghost" id="settings-close">Close</button>
      </div>
    </div>
  </div>

  <!-- SHEET: INTENTION JOURNAL -->
  <div class="sheet-overlay" id="journal-sheet" onclick="closeSheetOnBackdrop(event,'journal-sheet')">
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Intention Journal</div>
      <div class="sheet-subtitle">Your intention history over time</div>
      <div id="journal-entries"></div>
      <div class="sheet-actions">
        <button class="sheet-btn ghost" id="journal-close">Close</button>
      </div>
    </div>
  </div>

  <!-- HIDDEN: mode label + select used by app.js unchanged -->
  <span id="mode-label" style="display:none;">Full Council</span>
  <select id="mode-select" style="display:none;">
    <option value="council">council</option>
    <option value="architect">architect</option>
    <option value="visionary">visionary</option>
    <option value="strategist">strategist</option>
    <option value="emotional">emotional</option>
    <option value="energy">energy</option>
    <option value="questioner">questioner</option>
    <option value="historian">historian</option>
    <option value="language">language</option>
    <option value="connector">connector</option>
    <option value="commander">commander</option>
    <option value="amplifier">amplifier</option>
    <option value="observer">observer</option>
  </select>

  <script src="memory.js?v=5"></script>
  <script src="personas.js?v=5"></script>
  <script src="api.js?v=5"></script>
  <script src="orchestrator.js?v=5"></script>
  <script src="app.js?v=5"></script>

  <script>
    // NAV + SHEET HELPERS
    function setNavTab(tab) {
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
      var navBtn = document.getElementById("nav-" + tab);
      if (navBtn) navBtn.classList.add("active");
      closeSheet("solo-sheet");
      var sel = document.getElementById("mode-select");
      if (sel) { sel.value = tab; sel.dispatchEvent(new Event("change")); }
    }

    function openSoloSheet() {
      document.getElementById("solo-sheet").classList.add("active");
    }

    function openSettingsNav() {
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
      document.getElementById("nav-settings").classList.add("active");
      if (typeof openSettings === "function") openSettings();
    }

    function openIntentionJournalNav() {
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
      document.getElementById("nav-journal").classList.add("active");
      if (typeof openIntentionJournal === "function") openIntentionJournal();
    }

    function closeSheet(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove("active");
    }

    function closeSheetOnBackdrop(evt, id) {
      if (evt.target === document.getElementById(id)) closeSheet(id);
    }

    function selectSoloPersona(personaId) {
      closeSheet("solo-sheet");
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
      document.getElementById("nav-solo").classList.add("active");
      var sel = document.getElementById("mode-select");
      if (sel) { sel.value = personaId; sel.dispatchEvent(new Event("change")); }
    }

    document.addEventListener("DOMContentLoaded", function() {
      setTimeout(function() {
        if (typeof PERSONAS === "undefined") return;
        var container = document.getElementById("solo-persona-list");
        if (!container) return;
        PERSONAS.forEach(function(p) {
          var btn = document.createElement("button");
          btn.className = "solo-persona-btn";
          btn.setAttribute("type", "button");
          btn.innerHTML = "<span class='solo-persona-icon'>" + (p.icon || "&#9670;") + "</span>"
            + "<span class='solo-persona-name'>" + (p.shortName || p.name) + "</span>"
            + "<span class='solo-persona-role'>" + (p.role || "") + "</span>";
          btn.addEventListener("click", function() { selectSoloPersona(p.id); });
          container.appendChild(btn);
        });
      }, 200);
    });
  </script>
</body>
</html>
